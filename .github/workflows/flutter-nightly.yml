name: Flutter Nightly Build

on:
  # custom: build planifié retiré (évitait un échec + conso de minutes chaque nuit sur master).
  # On lance manuellement via "Run workflow" sur les branches user-client / dev-client.
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
